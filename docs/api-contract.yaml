openapi: 3.0.0
info:
  title: Travel Buddy Finder API
  description: |
    API Contract cho dự án Travel Buddy Finder (SOA Microservices).
    Payload JWT thống nhất cho toàn hệ thống: `{ "userId": 1, "email": "user@example.com", "iat": 1715400000, "exp": 1715486400 }` (Thuật toán: HS256)
    
    Lưu ý Chat WebSocket: `ws://host:8085/ws/chat?tripId={tripId}`
    - Client gửi: `{ "content": "tin nhắn" }`
    - Server broadcast: `{ "id": 1, "tripId": 1, "senderId": 2, "content": "tin nhắn", "createdAt": "2024-05-10T10:00:00Z" }`
  version: 1.0.0
servers:
  - url: http://localhost:8081
    description: User Service
  - url: http://localhost:8082
    description: Trip Service
  - url: http://localhost:8083
    description: Join Request Service
  - url: http://localhost:8084
    description: Notification Service
  - url: http://localhost:8085
    description: Chat Service
  - url: http://localhost:8086
    description: Review Service
paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Đăng ký tài khoản
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                bio:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
            example:
              name: "Nguyen Van A"
              email: "nva@example.com"
              password: "password123"
              bio: "Travel lover"
              tags: ["backpacker", "photography"]
      responses:
        '201':
          description: Đăng ký thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'
              example:
                id: 1
                name: "Nguyen Van A"
                email: "nva@example.com"
                createdAt: "2024-05-10T10:00:00Z"
        '400':
          description: Lỗi validation hoặc email trùng
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Bad Request"
                message: "Email đã tồn tại"

  /auth/login:
    post:
      tags:
        - Auth
      summary: Đăng nhập
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
            example:
              email: "nva@example.com"
              password: "password123"
      responses:
        '200':
          description: Đăng nhập thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      email:
                        type: string
              example:
                accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                user:
                  id: 1
                  name: "Nguyen Van A"
                  email: "nva@example.com"
        '401':
          description: Sai email hoặc password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{id}:
    get:
      tags:
        - User
      summary: Lấy thông tin user
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Thông tin user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'
              example:
                id: 1
                name: "Nguyen Van A"
                email: "nva@example.com"
                bio: "Travel lover"
                tags: ["backpacker", "photography"]
                createdAt: "2024-05-10T10:00:00Z"
        '401':
          description: Unauthorized
        '404':
          description: Không tìm thấy user

  /trips:
    post:
      tags:
        - Trip
      summary: Tạo chuyến đi
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, location, startDate, endDate, maxMember]
              properties:
                title:
                  type: string
                location:
                  type: string
                startDate:
                  type: string
                  format: date-time
                endDate:
                  type: string
                  format: date-time
                maxMember:
                  type: integer
                tags:
                  type: array
                  items:
                    type: string
            example:
              title: "Đi Đà Lạt cuối tuần"
              location: "Đà Lạt"
              startDate: "2024-06-01T00:00:00Z"
              endDate: "2024-06-03T00:00:00Z"
              maxMember: 5
              tags: ["chill", "nature"]
      responses:
        '201':
          description: Tạo thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripDTO'
              example:
                id: 1
                ownerId: 1
                title: "Đi Đà Lạt cuối tuần"
                location: "Đà Lạt"
                startDate: "2024-06-01T00:00:00Z"
                endDate: "2024-06-03T00:00:00Z"
                maxMember: 5
                tags: ["chill", "nature"]
                createdAt: "2024-05-10T10:00:00Z"
    get:
      tags:
        - Trip
      summary: Lấy danh sách chuyến đi
      parameters:
        - in: query
          name: location
          schema:
            type: string
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
        - in: query
          name: tags
          schema:
            type: string
            description: Lọc theo tags (comma separated)
      responses:
        '200':
          description: Danh sách trips
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TripDTO'
                  total:
                    type: integer
              example:
                data:
                  - id: 1
                    ownerId: 1
                    title: "Đi Đà Lạt cuối tuần"
                    location: "Đà Lạt"
                    startDate: "2024-06-01T00:00:00Z"
                    endDate: "2024-06-03T00:00:00Z"
                    maxMember: 5
                    tags: ["chill", "nature"]
                    createdAt: "2024-05-10T10:00:00Z"
                total: 1

  /trips/{id}:
    get:
      tags:
        - Trip
      summary: Lấy chi tiết chuyến đi
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Chi tiết trip
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripDTO'
              example:
                id: 1
                ownerId: 1
                title: "Đi Đà Lạt cuối tuần"
                location: "Đà Lạt"
                startDate: "2024-06-01T00:00:00Z"
                endDate: "2024-06-03T00:00:00Z"
                maxMember: 5
                tags: ["chill", "nature"]
                createdAt: "2024-05-10T10:00:00Z"
    put:
      tags:
        - Trip
      summary: Cập nhật chuyến đi (chỉ owner)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                location:
                  type: string
            example:
              title: "Đi Đà Lạt 4 ngày 3 đêm"
      responses:
        '200':
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripDTO'
    delete:
      tags:
        - Trip
      summary: Xoá chuyến đi (chỉ owner)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Xoá thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Deleted"

  /join-requests:
    post:
      tags:
        - Join Request
      summary: Gửi yêu cầu tham gia chuyến đi
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tripId]
              properties:
                tripId:
                  type: integer
            example:
              tripId: 1
      responses:
        '201':
          description: Đã gửi request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JoinRequestDTO'
              example:
                id: 1
                tripId: 1
                userId: 2
                status: "pending"
                createdAt: "2024-05-10T10:30:00Z"
    get:
      tags:
        - Join Request
      summary: Lấy danh sách yêu cầu tham gia (chỉ trip owner)
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: tripId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Danh sách join requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/JoinRequestDTO'
                  total:
                    type: integer
              example:
                data:
                  - id: 1
                    tripId: 1
                    userId: 2
                    status: "pending"
                    createdAt: "2024-05-10T10:30:00Z"
                total: 1

  /join-requests/{id}/approve:
    put:
      tags:
        - Join Request
      summary: Phê duyệt yêu cầu tham gia (chỉ trip owner)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Đã phê duyệt (publish event join.approved)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Approved"

  /join-requests/{id}/reject:
    put:
      tags:
        - Join Request
      summary: Từ chối yêu cầu tham gia (chỉ trip owner)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Đã từ chối (publish event join.rejected)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Rejected"

  /notifications/{userId}:
    get:
      tags:
        - Notification
      summary: Lấy thông báo của user
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Danh sách thông báo
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/NotificationDTO'
                  total:
                    type: integer
              example:
                data:
                  - id: 1
                    userId: 2
                    title: "Yêu cầu được chấp nhận"
                    content: "Bạn đã được tham gia chuyến đi Đà Lạt"
                    isRead: false
                    createdAt: "2024-05-10T11:00:00Z"
                total: 1

  /notifications/{id}/read:
    put:
      tags:
        - Notification
      summary: Đánh dấu thông báo đã đọc
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Đánh dấu đã đọc thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Marked as read"

  /messages:
    get:
      tags:
        - Chat
      summary: Lấy tin nhắn của chuyến đi
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: tripId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Danh sách tin nhắn
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MessageDTO'
                  total:
                    type: integer
              example:
                data:
                  - id: 1
                    tripId: 1
                    senderId: 1
                    content: "Chào mọi người"
                    createdAt: "2024-05-10T10:00:00Z"
                total: 1

  /reviews:
    post:
      tags:
        - Review
      summary: Đánh giá user
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tripId, targetUserId, rating, comment]
              properties:
                tripId:
                  type: integer
                targetUserId:
                  type: integer
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
            example:
              tripId: 1
              targetUserId: 1
              rating: 5
              comment: "Leader cực kỳ nhiệt tình!"
      responses:
        '201':
          description: Đánh giá thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewDTO'
              example:
                id: 1
                tripId: 1
                reviewerId: 2
                targetUserId: 1
                rating: 5
                comment: "Leader cực kỳ nhiệt tình!"
                createdAt: "2024-05-12T10:00:00Z"

  /reviews/user/{id}:
    get:
      tags:
        - Review
      summary: Lấy đánh giá về user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Danh sách reviews
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ReviewDTO'
                  total:
                    type: integer
              example:
                data:
                  - id: 1
                    tripId: 1
                    reviewerId: 2
                    targetUserId: 1
                    rating: 5
                    comment: "Leader cực kỳ nhiệt tình!"
                    createdAt: "2024-05-12T10:00:00Z"
                total: 1

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserDTO:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        bio:
          type: string
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    TripDTO:
      type: object
      properties:
        id:
          type: integer
        ownerId:
          type: integer
        title:
          type: string
        location:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        maxMember:
          type: integer
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    JoinRequestDTO:
      type: object
      properties:
        id:
          type: integer
        tripId:
          type: integer
        userId:
          type: integer
        status:
          type: string
          enum: [pending, approved, rejected]
        createdAt:
          type: string
          format: date-time

    NotificationDTO:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        title:
          type: string
        content:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time

    MessageDTO:
      type: object
      properties:
        id:
          type: integer
        tripId:
          type: integer
        senderId:
          type: integer
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    ReviewDTO:
      type: object
      properties:
        id:
          type: integer
        tripId:
          type: integer
        reviewerId:
          type: integer
        targetUserId:
          type: integer
        rating:
          type: integer
        comment:
          type: string
        createdAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
