name: Travel Buddy Finder CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Job 1: Lint & Unit Tests for Node.js Microservices
  lint-nodejs:
    name: Node.js Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            api-gateway/package-lock.json
            trip-service/package-lock.json
            join-request-service/package-lock.json
            notification-service/package-lock.json
            chat-service/package-lock.json

      - name: Syntax Linting (Node.js syntax compiler check)
        run: |
          echo "Checking JavaScript syntax for all Node.js source files..."
          find . -name "*.js" -not -path "*/node_modules/*" -not -path "*/shared/*" | while read -r file; do
            node --check "$file" || exit 1
          done
          echo "✔ JavaScript syntax validation passed successfully."

      - name: Test Node.js microservices
        run: |
          for service in api-gateway trip-service join-request-service notification-service chat-service; do
            echo "===================================================="
            echo "📦 Processing Node.js Service: $service"
            echo "===================================================="
            cd "$service"
            if [ -f package.json ]; then
              npm ci
              # Run test only if the test script is explicitly defined in package.json
              if npm run | grep -q "test"; then
                echo "🧪 Running unit tests..."
                npm test
              else
                echo "ℹ No unit test script defined. Skipping tests."
              fi
            fi
            cd ..
          done

  # Job 2: Compile & Test Java Microservices
  build-java:
    name: Java Compile & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile and Test User Service
        run: |
          echo "===================================================="
          echo "☕ Processing Java Service: user-service"
          echo "===================================================="
          cd user-service
          mvn clean test-compile

      - name: Compile and Test Review Service
        run: |
          echo "===================================================="
          echo "☕ Processing Java Service: review-service"
          echo "===================================================="
          cd review-service
          mvn clean test-compile

  # Job 3: Docker Images Build Verification
  docker-build:
    name: Verify Docker Container Builds
    needs: [lint-nodejs, build-java]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v2

      - name: Build and Verify Gateway Image
        uses: docker/build-push-action@v4
        with:
          context: ./api-gateway
          push: false
          tags: travel-buddy-finder-api-gateway:latest

      - name: Build and Verify User Service Image
        uses: docker/build-push-action@v4
        with:
          context: ./user-service
          push: false
          tags: travel-buddy-finder-user-service:latest

      - name: Build and Verify Trip Service Image
        uses: docker/build-push-action@v4
        with:
          context: ./trip-service
          push: false
          tags: travel-buddy-finder-trip-service:latest

      - name: Build and Verify Join Request Image
        uses: docker/build-push-action@v4
        with:
          context: ./join-request-service
          push: false
          tags: travel-buddy-finder-join-request-service:latest

      - name: Build and Verify Notification Image
        uses: docker/build-push-action@v4
        with:
          context: ./notification-service
          push: false
          tags: travel-buddy-finder-notification-service:latest

      - name: Build and Verify Chat Image
        uses: docker/build-push-action@v4
        with:
          context: ./chat-service
          push: false
          tags: travel-buddy-finder-chat-service:latest

      - name: Build and Verify Review Image
        uses: docker/build-push-action@v4
        with:
          context: ./review-service
          push: false
          tags: travel-buddy-finder-review-service:latest

  # Job 4: Full System E2E Integration Testing
  integration-test:
    name: Full E2E Integration Testing
    needs: [lint-nodejs, build-java]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Create Temporary Env File
        run: |
          cp .env.example .env
          echo "JWT_SECRET=supersecretjwtkey1234567890123456" >> .env
          echo "POSTGRES_USER=postgres" >> .env
          echo "POSTGRES_PASSWORD=postgres" >> .env
          echo "POSTGRES_DB=travel_buddy_db" >> .env
          echo "RABBITMQ_DEFAULT_USER=guest" >> .env
          echo "RABBITMQ_DEFAULT_PASS=guest" >> .env

      - name: Pull and Run Docker-Compose Infrastructure
        run: |
          docker compose up --build -d

      - name: Wait for Microservices and RabbitMQ Health Checks
        run: |
          echo "Waiting 30 seconds for complete system cold start..."
          sleep 30
          node scripts/health-check.js

      - name: Execute Automated E2E Integration Flows
        run: |
          node scripts/integration-test.js

      - name: Capture System Diagnostics on Failure
        if: failure()
        run: |
          echo "===================================================="
          echo "🚨 DIAGNOSTICS: Container Logs & States"
          echo "===================================================="
          docker compose ps
          docker compose logs --tail=100
