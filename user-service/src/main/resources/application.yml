server:
  port: ${USER_SERVICE_PORT:8081}

spring:
  application:
    name: user-service

  datasource:
    url: ${USER_DB_URL:jdbc:postgresql://localhost:5432/user_db}
    username: ${USER_DB_USERNAME:postgres}
    password: ${USER_DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update       # dùng 'validate' khi production
    show-sql: false          # tắt để tránh log query có data nhạy cảm
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

# ⭐ JWT config – TV3 leader quy định payload: { userId, email, iat, exp }
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRES_IN:7d}

# Logging
logging:
  level:
    com.travelbuddy: DEBUG
    org.springframework.security: INFO
