version: '3.9'

services:
  # ============================================================
  # TẦNG 1: DATABASES & MESSAGE BROKER
  # ============================================================
  postgres-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - travel-buddy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    networks:
      - travel-buddy-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # TẦNG 2: MICROSERVICES
  # ============================================================
  user-service:
    build: ./user-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/user_db
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-password}
      - JWT_SECRET=${JWT_SECRET}
      - TRUST_GATEWAY=true
    networks:
      - travel-buddy-network
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: unless-stopped

  trip-service:
    build:
      context: .
      dockerfile: ./trip-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - TRIP_DB_HOST=postgres-db
      - TRIP_DB_PORT=5432
      - TRIP_DB_NAME=trip_db
      - TRIP_DB_USER=${DB_USER:-postgres}
      - TRIP_DB_PASSWORD=${DB_PASSWORD:-password}
      - JWT_SECRET=${JWT_SECRET}
      - TRUST_GATEWAY=true
    networks:
      - travel-buddy-network
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: unless-stopped

  join-request-service:
    build:
      context: .
      dockerfile: ./join-request-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      - JOIN_DB_HOST=postgres-db
      - JOIN_DB_PORT=5432
      - JOIN_DB_NAME=join_db
      - JOIN_DB_USER=${DB_USER:-postgres}
      - JOIN_DB_PASSWORD=${DB_PASSWORD:-password}
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - TRUST_GATEWAY=true
    networks:
      - travel-buddy-network
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build: ./notification-service
    ports:
      - "8084:8084"
    environment:
      - NOTIFICATION_DB_HOST=postgres-db
      - NOTIFICATION_DB_PORT=5432
      - NOTIFICATION_DB_NAME=notification_db
      - NOTIFICATION_DB_USER=${DB_USER:-postgres}
      - NOTIFICATION_DB_PASSWORD=${DB_PASSWORD:-password}
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - TRUST_GATEWAY=true
    networks:
      - travel-buddy-network
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  chat-service:
    build:
      context: .
      dockerfile: ./chat-service/Dockerfile
    ports:
      - "8085:8085"
    environment:
      - CHAT_DB_HOST=postgres-db
      - CHAT_DB_PORT=5432
      - CHAT_DB_NAME=chat_db
      - CHAT_DB_USER=${DB_USER:-postgres}
      - CHAT_DB_PASSWORD=${DB_PASSWORD:-password}
      - JWT_SECRET=${JWT_SECRET}
      - TRUST_GATEWAY=true
    networks:
      - travel-buddy-network
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: unless-stopped

#   review-service:
#     build: ./review-service
#     ports:
#       - "8086:8086"
#     environment:
#       - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/review_db
#       - SPRING_DATASOURCE_USERNAME=${DB_USER:-postgres}
#       - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-password}
#       - JWT_SECRET=${JWT_SECRET}
#       - TRUST_GATEWAY=true
#     networks:
#       - travel-buddy-network
#     depends_on:
#       postgres-db:
#         condition: service_healthy
#     restart: unless-stopped

  # ============================================================
  # TẦNG 3: API GATEWAY
  # ============================================================
  api-gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - USER_SERVICE_URL=http://user-service:8081
      - TRIP_SERVICE_URL=http://trip-service:8082
      - JOIN_SERVICE_URL=http://join-request-service:8083
      - NOTIFICATION_SERVICE_URL=http://notification-service:8084
      - CHAT_SERVICE_URL=http://chat-service:8085
      - REVIEW_SERVICE_URL=http://review-service:8086
    networks:
      - travel-buddy-network
    depends_on:
      - user-service
      - trip-service
      - join-request-service
      - notification-service
      - chat-service
    restart: unless-stopped

  # ============================================================
  # TẦNG 4: FRONTEND
  # ============================================================
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:3000
    networks:
      - travel-buddy-network
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  travel-buddy-network:
    driver: bridge
