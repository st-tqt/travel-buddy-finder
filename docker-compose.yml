version: '3.8'

services:
  # ===========================================================================
  # DATABASES (PostgreSQL)
  # ===========================================================================
  user-db:
    image: postgres:15-alpine
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travel-buddy-network

  trip-db:
    image: postgres:15-alpine
    container_name: trip-db
    environment:
      POSTGRES_DB: trip_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - trip-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travel-buddy-network

  join-db:
    image: postgres:15-alpine
    container_name: join-db
    environment:
      POSTGRES_DB: join_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5434:5432"
    volumes:
      - join-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travel-buddy-network

  notification-db:
    image: postgres:15-alpine
    container_name: notification-db
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5435:5432"
    volumes:
      - notification-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travel-buddy-network

  chat-db:
    image: postgres:15-alpine
    container_name: chat-db
    environment:
      POSTGRES_DB: chat_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5436:5432"
    volumes:
      - chat-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travel-buddy-network

  review-db:
    image: postgres:15-alpine
    container_name: review-db
    environment:
      POSTGRES_DB: review_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5437:5432"
    volumes:
      - review-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travel-buddy-network

  # ===========================================================================
  # MESSAGE BROKER
  # ===========================================================================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travel-buddy-network

  # ===========================================================================
  # BACKEND SERVICES
  # ===========================================================================
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/user_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: secret
      APP_JWT_SECRET: ${JWT_SECRET}
      APP_JWT_EXPIRATION: ${JWT_EXPIRES_IN}
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - travel-buddy-network
    restart: on-failure

  trip-service:
    build: ./trip-service
    container_name: trip-service
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: trip-db
      DB_PORT: 5432
      DB_NAME: trip_db
      DB_USER: postgres
      DB_PASSWORD: secret
    depends_on:
      trip-db:
        condition: service_healthy
    networks:
      - travel-buddy-network
    restart: on-failure

  join-request-service:
    build: ./join-request-service
    container_name: join-request-service
    ports:
      - "8083:8083"
    environment:
      PORT: 8083
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: join-db
      DB_PORT: 5432
      DB_NAME: join_db
      DB_USER: postgres
      DB_PASSWORD: secret
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      join-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - travel-buddy-network
    restart: on-failure

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8084:8084"
    environment:
      PORT: 8084
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: notification-db
      DB_PORT: 5432
      DB_NAME: notification_db
      DB_USER: postgres
      DB_PASSWORD: secret
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - travel-buddy-network
    restart: on-failure

  chat-service:
    build: ./chat-service
    container_name: chat-service
    ports:
      - "8085:8085"
    environment:
      PORT: 8085
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: chat-db
      DB_PORT: 5432
      DB_NAME: chat_db
      DB_USER: postgres
      DB_PASSWORD: secret
    depends_on:
      chat-db:
        condition: service_healthy
    networks:
      - travel-buddy-network
    restart: on-failure

  # review-service:
  #   build: ./review-service
  #   container_name: review-service
  #   ports:
  #     - "8086:8086"
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://review-db:5432/review_db
  #     SPRING_DATASOURCE_USERNAME: postgres
  #     SPRING_DATASOURCE_PASSWORD: secret
  #     APP_JWT_SECRET: ${JWT_SECRET}
  #   depends_on:
  #     review-db:
  #       condition: service_healthy
  #   networks:
  #     - travel-buddy-network
  #   restart: on-failure

  # ===========================================================================
  # FRONTEND
  # ===========================================================================
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    # Note: api-gateway chưa có trong tuần 1, sẽ thêm depends_on vào tuần 2
    # depends_on:
    #   - api-gateway
    networks:
      - travel-buddy-network

# ===========================================================================
# VOLUMES & NETWORKS
# ===========================================================================
networks:
  travel-buddy-network:
    driver: bridge

volumes:
  user-db-data:
  trip-db-data:
  join-db-data:
  notification-db-data:
  chat-db-data:
  review-db-data:
