server:
  port: ${REVIEW_SERVICE_PORT:8086}

spring:
  application:
    name: review-service

  datasource:
    url: ${REVIEW_DB_URL:jdbc:postgresql://localhost:5432/review_db}
    username: ${REVIEW_DB_USERNAME:postgres}
    password: ${REVIEW_DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRES_IN:7d}

logging:
  level:
    com.travelbuddy: DEBUG
